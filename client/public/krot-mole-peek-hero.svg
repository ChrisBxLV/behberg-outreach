<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 216" fill="none" role="img" aria-labelledby="krotPeekTitle">
  <title id="krotPeekTitle">Krot mole mascot</title>
  <desc>
    Flat mascot: charcoal mole head with yellow eyes and snout, black whiskers, peeking over a dark hole with yellow paws on the rim. Transparent background.
  </desc>
  <!-- Head (charcoal circle) -->
  <circle cx="100" cy="90" r="58" fill="#3d3d3d" />
  <!-- Yellow eyes -->
  <circle cx="76" cy="84" r="10" fill="#EAB308" />
  <circle cx="124" cy="84" r="10" fill="#EAB308" />
  <!-- Yellow snout -->
  <ellipse cx="100" cy="108" rx="30" ry="18" fill="#FACC15" />
  <circle cx="90" cy="108" r="3.2" fill="#171717" />
  <circle cx="110" cy="108" r="3.2" fill="#171717" />
  <!-- Thin horizontal whiskers -->
  <g stroke="#0a0a0a" stroke-width="2.4" stroke-linecap="round">
    <line x1="18" y1="76" x2="48" y2="76" />
    <line x1="16" y1="90" x2="46" y2="90" />
    <line x1="18" y1="104" x2="48" y2="104" />
    <line x1="182" y1="76" x2="152" y2="76" />
    <line x1="184" y1="90" x2="154" y2="90" />
    <line x1="182" y1="104" x2="152" y2="104" />
  </g>
  <!-- Dark hole / block (front of burrow) -->
  <rect x="14" y="128" width="172" height="88" rx="16" fill="#252525" />
  <!-- Yellow paws on top rim of hole -->
  <ellipse cx="72" cy="128" rx="24" ry="15" fill="#EAB308" />
  <ellipse cx="128" cy="128" rx="24" ry="15" fill="#EAB308" />
  <!-- Simple claw lines -->
  <g stroke="#171717" stroke-width="1.8" stroke-linecap="round">
    <path d="M58 136v9M72 138v11M86 136v9" />
    <path d="M114 136v9M128 138v11M142 136v9" />
  </g>
</svg>

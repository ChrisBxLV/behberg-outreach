    <meta name="application-name" content="Krot" />

    <meta property="og:site_name" content="Krot" />

    <meta name="twitter:image:alt" content="Krot" />
    <script>
      // Prevent theme FOUC by applying class before first paint.
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          var isDark = theme === "dark"; // default light
          var root = document.documentElement;
          if (isDark) root.classList.add("dark");
          else root.classList.remove("dark");
        } catch (_) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <link rel="icon" href="/krot-logo-transparent.png" type="image/png" />
    <link rel="apple-touch-icon" href="/krot-logo-transparent.png" />
    <title>Krot | Email outreach software</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

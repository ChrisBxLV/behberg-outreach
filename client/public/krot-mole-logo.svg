<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-labelledby="krotLogoTitle">
  <title id="krotLogoTitle">Krot: email outreach software</title>
  <desc id="krotLogoDesc">
    Krot krot.io logo: yellow circle with cream mole, pink snout, and black whiskers.
  </desc>
  <circle cx="64" cy="64" r="58" fill="#FDE047" stroke="#EAB308" stroke-width="2.2" />
  <ellipse cx="64" cy="76" rx="40" ry="34" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="1.2" />
  <ellipse cx="64" cy="56" rx="28" ry="22" fill="#FFFBEF" stroke="#E8D5A3" stroke-width="1.1" />
  <!-- Light pink snout (matches uploaded brand art) -->
  <ellipse cx="64" cy="62" rx="16" ry="8" fill="#F5C4BF" stroke="#E8A598" stroke-width="0.9" />
  <circle cx="56.5" cy="62" r="2.2" fill="#292524" />
  <circle cx="71.5" cy="62" r="2.2" fill="#292524" />
  <!-- Small black dot eyes -->
  <circle cx="49" cy="49" r="2.6" fill="#171717" />
  <circle cx="79" cy="49" r="2.6" fill="#171717" />
  <!-- Thin black whiskers -->
  <g stroke="#171717" stroke-width="1.65" stroke-linecap="round" fill="none">
    <path d="M18 44q12-2 24 4" />
    <path d="M14 52q14-2 26 4" />
    <path d="M18 60q12-2 24 4" />
    <path d="M110 44q-12-2-24 4" />
    <path d="M114 52q-14-2-26 4" />
    <path d="M110 60q-12-2-24 4" />
  </g>
  <ellipse cx="36" cy="100" rx="15" ry="12" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="1" />
  <ellipse cx="92" cy="100" rx="15" ry="12" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="1" />
  <!-- Claws: thin black strokes -->
  <g stroke="#171717" stroke-width="1.85" stroke-linecap="round" fill="none">
    <path d="M24 108v11M36 108v13M48 108v11" />
    <path d="M80 108v11M92 108v13M104 108v11" />

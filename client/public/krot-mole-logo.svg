  <circle cx="56" cy="60" r="2.75" fill="#292524" />
  <circle cx="72" cy="60" r="2.75" fill="#292524" />
  <!-- Eyes -->
  <circle cx="46" cy="42" r="6" fill="#FFFFFF" stroke="#EAB308" stroke-width="1.5" />
  <circle cx="82" cy="42" r="6" fill="#FFFFFF" stroke="#EAB308" stroke-width="1.5" />
  <!-- Whiskers -->
  <g stroke="#D97706" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M18 42c10-4 18-2 26 2" />
    <path d="M16 50c10-3 20-2 28 2" />
    <path d="M18 58c10-3 18-2 26 2" />
    <path d="M110 42c-10-4-18-2-26 2" />
    <path d="M112 50c-10-3-20-2-28 2" />
    <path d="M110 58c-10-3-18-2-26 2" />

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 112" fill="none" role="img" aria-labelledby="krotLogoTitle">
  <title id="krotLogoTitle">Krot: email outreach software</title>
  <desc id="krotLogoDesc">
